name: Build BaizeTester IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install xcodegen
        run: brew install xcodegen
      
      - name: Install ldid
        run: brew install ldid-procursus
      
      - name: Generate Xcode project
        run: |
          xcodegen generate
          echo "=== Schemes ==="
          find BaizeTester.xcodeproj -name "*.xcscheme" 2>/dev/null || echo "No schemes"
      
      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun --show-sdk-version -sdk iphoneos
      
      # ⚡ CRITICAL: Download Python BEFORE xcodebuild so we can LINK against it
      # iOS cannot dlopen complex dylibs at runtime (AMFI kills process).
      # The official approach (used by Briefcase/beeWare) is to link the
      # Python dylib at BUILD TIME. dyld loads it automatically at app launch.
      - name: Download Python 3.13 for iOS (beeWare) — BEFORE build
        run: |
          echo "=== Downloading beeware Python-Apple-support ==="
          curl -L -o python-ios.tar.gz \
            "https://github.com/beeware/Python-Apple-support/releases/download/3.13-b14/Python-3.13-iOS-support.b14.tar.gz"
          
          echo "=== Extracting ==="
          mkdir -p python-ios-full
          tar xzf python-ios.tar.gz -C python-ios-full
          
          echo "=== Exploring archive structure ==="
          find python-ios-full -name "python3.13" -type d | head -10
          echo "--- XCFramework root lib/python3.13/ file count ---"
          find python-ios-full/Python.xcframework/lib/python3.13 -type f 2>/dev/null | wc -l
          echo "--- lib-arm64/python3.13/ file count ---"
          find python-ios-full/Python.xcframework/ios-arm64/lib-arm64/python3.13 -type f 2>/dev/null | wc -l
          
          echo "=== Copying dylibs for linking ==="
          mkdir -p python-ios
          cp -v python-ios-full/Python.xcframework/ios-arm64/lib/*.dylib python-ios/
          ls -lh python-ios/
          
          echo "=== Copying FULL stdlib (both .py + .so) ==="
          mkdir -p python-ios/lib/python3.13
          # 1. Copy Python source files (.py) — from XCFramework root (cross-platform)
          if [ -d python-ios-full/Python.xcframework/lib/python3.13 ]; then
            cp -R python-ios-full/Python.xcframework/lib/python3.13/* python-ios/lib/python3.13/
            echo "Copied from Python.xcframework/lib/python3.13/ (.py source)"
          fi
          # 2. Copy ARM64 compiled extensions (.so) — overwrites/merges
          if [ -d python-ios-full/Python.xcframework/ios-arm64/lib-arm64/python3.13 ]; then
            cp -R python-ios-full/Python.xcframework/ios-arm64/lib-arm64/python3.13/* python-ios/lib/python3.13/
            echo "Copied from ios-arm64/lib-arm64/python3.13/ (.so extensions)"
          fi
          echo "Total stdlib files: $(find python-ios/lib/python3.13 -type f | wc -l)"
          echo "--- encodings ---"
          ls python-ios/lib/python3.13/encodings/ 2>/dev/null | head -5 || echo "MISSING!"
          echo "--- site.py ---"
          ls -la python-ios/lib/python3.13/site.py 2>/dev/null || echo "MISSING!"
          du -sh python-ios/
      
      # Build with Python linked at compile time (not dlopen'd at runtime!)
      - name: Build archive (linked to libpython3.13)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project BaizeTester.xcodeproj \
            -scheme BaizeTester \
            -archivePath ./build/BaizeTester.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            OTHER_LDFLAGS='$(OTHER_LDFLAGS) -L$(PROJECT_DIR)/python-ios -lpython3.13' \
            LIBRARY_SEARCH_PATHS='$(inherited) $(PROJECT_DIR)/python-ios'
      
      - name: Cross-compile baize_v2
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          # v5: executable (posix_spawn test)
          xcrun clang -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=15.0 \
            -o baize_v2 \
            BaizeTester/baize_v2.c
          echo "=== baize_v2 ==="
          file baize_v2
          ls -la baize_v2
          
          # v6: dylib (dlopen test - runs in App process!)
          xcrun clang -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=15.0 \
            -shared \
            -o libbaize_v2.dylib \
            BaizeTester/baize_v2_lib.c
          echo "=== libbaize_v2.dylib ==="
          file libbaize_v2.dylib
          ls -la libbaize_v2.dylib
      
      - name: Package IPA
        run: |
          set -ex
          trap 'echo "FAILED at line $LINENO: $BASH_COMMAND"' ERR
          APP_PATH="./build/BaizeTester.xcarchive/Products/Applications/BaizeTester.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found at $APP_PATH"
            find ./build -name "*.app" | head -5
            exit 1
          fi
          
          echo "=== Embedding binaries ==="
          cp -v baize_v2 "$APP_PATH/"
          cp -v libbaize_v2.dylib "$APP_PATH/"
          
          # Embed Python dylib with CORRECT framework layout
          # libpython3.13.dylib install name: @rpath/Python.framework/Python
          # dyld resolves: @rpath/Python.framework/Python
          #   → @executable_path/Frameworks/Python.framework/Python
          #   → {APP}/Frameworks/Python.framework/Python  ← MUST match this path!
          echo "=== Embedding Python dylib (framework layout) ==="
          mkdir -p "$APP_PATH/Frameworks/Python.framework"
          cp -v python-ios/libpython3.13.dylib "$APP_PATH/Frameworks/Python.framework/Python"
          
          echo "=== Dylib install name (verify) ==="
          otool -D "$APP_PATH/Frameworks/Python.framework/Python"
          echo "=== Dylib dependencies ==="
          otool -L "$APP_PATH/Frameworks/Python.framework/Python" | head -10
          
          # Copy stdlib
          echo "=== Embedding Python stdlib ==="
          cp -R python-ios/lib "$APP_PATH/"
          echo "Stdlib files: $(find "$APP_PATH/lib/python3.13" -type f 2>/dev/null | wc -l)"
          
          # Set rpath so dyld can resolve @rpath/*.dylib → Frameworks/
          echo "=== Setting rpath ==="
          otool -l "$APP_PATH/BaizeTester" | grep -A2 LC_RPATH || echo "(no LC_RPATH yet)"
          install_name_tool -add_rpath "@executable_path/Frameworks" "$APP_PATH/BaizeTester" 2>/dev/null || echo "rpath may already exist"
          echo "After:"
          otool -l "$APP_PATH/BaizeTester" | grep -A2 LC_RPATH
          
          # Show LC_LOAD_DYLIB entries (should include libpython3.13 now)
          echo "=== LC_LOAD_DYLIB entries ==="
          otool -L "$APP_PATH/BaizeTester"
          
          # Sign main binary
          echo "=== Signing main binary ==="
          ldid2 -SBaizeTester/Entitlements.plist "$APP_PATH/BaizeTester" || { echo "FATAL: main binary signing failed"; exit 1; }
          
          # Sign embedded binaries
          echo "=== Signing embedded binaries ==="
          ldid2 -S "$APP_PATH/baize_v2" || echo "WARN: baize_v2 signing failed"
          ldid2 -S "$APP_PATH/libbaize_v2.dylib" || echo "WARN: libbaize_v2 signing failed"
          
          # Sign Python dylib (framework layout)
          echo "=== Signing Python dylib ==="
          ldid2 -S "$APP_PATH/Frameworks/Python.framework/Python" || echo "WARN: Python dylib signing failed"
          
          # Sign Python .so extensions
          echo "=== Signing .so extensions ==="
          find "$APP_PATH/lib/python3.13" -name "*.so" -type f -print0 | while IFS= read -r -d '' so; do
            ldid2 -S "$so" || echo "WARN: failed to sign $so"
          done
          
          # Verify
          echo "=== Verify ==="
          ldid2 -e "$APP_PATH/BaizeTester" 2>&1 | head -5
          
          # Package IPA
          mkdir -p Payload
          rm -rf Payload/BaizeTester.app
          cp -R "$APP_PATH" Payload/
          zip -r BaizeTester.ipa Payload/
          
          echo "IPA size: $(ls -lh BaizeTester.ipa | awk '{print $5}')"
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BaizeTester.ipa
          path: BaizeTester.ipa
          retention-days: 7
