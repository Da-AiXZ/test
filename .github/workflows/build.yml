name: Build BaizeTester IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install xcodegen
        run: brew install xcodegen
      
      - name: Install ldid
        run: brew install ldid-procursus
      
      - name: Generate Xcode project
        run: |
          xcodegen generate
          echo "=== Schemes ==="
          find BaizeTester.xcodeproj -name "*.xcscheme" 2>/dev/null || echo "No schemes"
      
      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun --show-sdk-version -sdk iphoneos
      
      - name: Build archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project BaizeTester.xcodeproj \
            -scheme BaizeTester \
            -archivePath ./build/BaizeTester.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO
      
      - name: Cross-compile baize_v2
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          # v5: executable (posix_spawn test)
          xcrun clang -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=15.0 \
            -o baize_v2 \
            BaizeTester/baize_v2.c
          echo "=== baize_v2 ==="
          file baize_v2
          ls -la baize_v2
          
          # v6: dylib (dlopen test - runs in App process!)
          xcrun clang -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=15.0 \
            -shared \
            -o libbaize_v2.dylib \
            BaizeTester/baize_v2_lib.c
          echo "=== libbaize_v2.dylib ==="
          file libbaize_v2.dylib
          ls -la libbaize_v2.dylib
      
      - name: Download Python 3.13 for iOS (beeWare)
        run: |
          echo "=== Downloading beeware Python-Apple-support ==="
          curl -L -o python-ios.tar.gz \
            "https://github.com/beeware/Python-Apple-support/releases/download/3.13-b14/Python-3.13-iOS-support.b14.tar.gz"
          
          echo "=== Extracting full tarball ==="
          mkdir -p python-ios-full
          tar xzf python-ios.tar.gz -C python-ios-full
          
          echo "=== Copying ALL framework dylibs ==="
          mkdir -p python-ios/lib
          # Copy ALL dylibs from the framework (libffi, libssl, libcrypto, etc.)
          # libpython3.13.dylib depends on these at runtime
          cp -v python-ios-full/Python.xcframework/ios-arm64/lib/*.dylib python-ios/
          echo "All dylibs:"
          ls -lh python-ios/*.dylib
          
          # Stdlib -> arrange as lib/python3.13/
          cp -R python-ios-full/Python.xcframework/ios-arm64/lib-arm64/python3.13 python-ios/lib/
          
          echo "=== Python artifacts ==="
          echo "Dylib count: $(ls python-ios/*.dylib 2>/dev/null | wc -l)"
          ls -lh python-ios/*.dylib 2>/dev/null
          echo "Stdlib files: $(find python-ios/lib/python3.13 -type f | wc -l)"
          du -sh python-ios/
      
      - name: Package IPA
        run: |
          set -ex
          trap 'echo "FAILED at line $LINENO: $BASH_COMMAND"' ERR
          APP_PATH="./build/BaizeTester.xcarchive/Products/Applications/BaizeTester.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found at $APP_PATH"
            find ./build -name "*.app" | head -5
            exit 1
          fi
          
          echo "=== Embedding binaries ==="
          cp -v baize_v2 "$APP_PATH/"
          cp -v libbaize_v2.dylib "$APP_PATH/"
          
          # Embed ALL Python dylibs + stdlib
          echo "=== Embedding Python ==="
          if [ ! -f python-ios/libpython3.13.dylib ]; then
            echo "ERROR: python-ios/libpython3.13.dylib not found"
            ls -la python-ios/ 2>/dev/null || true
            exit 1
          fi
          
          # Copy ALL framework dylibs (libffi, libssl, libcrypto, etc.)
          cp -v python-ios/*.dylib "$APP_PATH/"
          
          if [ ! -d python-ios/lib/python3.13 ]; then
            echo "ERROR: python-ios/lib/python3.13 not found"
            find python-ios -type d | head -10
            exit 1
          fi
          cp -R python-ios/lib "$APP_PATH/"
          echo "Python stdlib: $(find "$APP_PATH/lib/python3.13" -type f 2>/dev/null | wc -l) files"
          
          # CRITICAL: Fix dylib install names to use @loader_path
          # Without this, dyld can't find dependencies → instant crash
          echo "=== Fixing dylib install names ==="
          cd "$APP_PATH"
          for dylib in *.dylib; do
            echo "--- $dylib ---"
            # Show current ID and dependencies
            otool -L "$dylib" | head -20
            # Change dylib's own install name to @loader_path
            install_name_tool -id "@loader_path/$dylib" "$dylib" 2>/dev/null || echo "  (id change skipped)"
            # Change all @rpath/ dependencies to @loader_path/
            for dep in $(otool -L "$dylib" | grep '@rpath/' | awk '{print $1}'); do
              dep_name=$(basename "$dep")
              echo "  Changing $dep → @loader_path/$dep_name"
              install_name_tool -change "$dep" "@loader_path/$dep_name" "$dylib"
            done
          done
          echo "=== Fixed dylib dependencies ==="
          for dylib in *.dylib; do
            echo "--- $dylib ---"
            otool -L "$dylib" | head -20
          done
          cd -
          
          # Sign main binary
          echo "=== Adding rpath + signing main binary ==="
          # Add @executable_path to rpath so it can find dylibs in app root
          install_name_tool -add_rpath "@executable_path" "$APP_PATH/BaizeTester" 2>/dev/null || echo "WARN: rpath add failed (may already exist)"
          otool -l "$APP_PATH/BaizeTester" | grep -A2 LC_RPATH || echo "  (no LC_RPATH)"
          ldid2 -SBaizeTester/Entitlements.plist "$APP_PATH/BaizeTester" || { echo "FATAL: main binary signing failed"; exit 1; }
          
          # Sign embedded binaries
          echo "=== Signing embedded binaries ==="
          ldid2 -S "$APP_PATH/baize_v2" || echo "WARN: baize_v2 signing failed"
          ldid2 -S "$APP_PATH/libbaize_v2.dylib" || echo "WARN: libbaize_v2 signing failed"
          
          # Sign ALL Python dylibs (not just libpython3.13)
          echo "=== Signing all Python dylibs ==="
          for dylib in "$APP_PATH"/*.dylib; do
            echo "Signing: $(basename "$dylib")"
            ldid2 -S "$dylib" || echo "WARN: failed to sign $(basename "$dylib")"
          done
          
          # Sign Python .so extensions
          echo "=== Signing .so extensions ==="
          SO_COUNT=0
          find "$APP_PATH/lib/python3.13" -name "*.so" -type f -print0 | while IFS= read -r -d '' so; do
            ldid2 -S "$so" || echo "WARN: failed to sign $so"
            SO_COUNT=$((SO_COUNT + 1))
          done
          echo "Signed $SO_COUNT .so files"
          
          # Verify main binary entitlements
          echo "=== Verify ==="
          ldid2 -e "$APP_PATH/BaizeTester" 2>&1 | head -5
          
          # Package IPA
          mkdir -p Payload
          rm -rf Payload/BaizeTester.app
          cp -R "$APP_PATH" Payload/
          zip -r BaizeTester.ipa Payload/
          
          echo "IPA size: $(ls -lh BaizeTester.ipa | awk '{print $5}')"
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BaizeTester.ipa
          path: BaizeTester.ipa
          retention-days: 7
