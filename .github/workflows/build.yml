name: Build BaizeTester IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install xcodegen
        run: brew install xcodegen
      
      - name: Install ldid
        run: brew install ldid-procursus
      
      - name: Generate Xcode project
        run: |
          xcodegen generate
          echo "=== Schemes ==="
          find BaizeTester.xcodeproj -name "*.xcscheme" 2>/dev/null || echo "No schemes"
      
      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun --show-sdk-version -sdk iphoneos
      
      - name: Build archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project BaizeTester.xcodeproj \
            -scheme BaizeTester \
            -archivePath ./build/BaizeTester.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO
      
      - name: Package IPA
        run: |
          APP_PATH="./build/BaizeTester.xcarchive/Products/Applications/BaizeTester.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found"
            find ./build -name "*.app" | head -5
            exit 1
          fi
          
          echo "=== .app contents ==="
          ls -la "$APP_PATH/"
          
          # 伪签名主二进制
          echo "=== Signing ==="
          ldid2 -SBaizeTester/Entitlements.plist "$APP_PATH/BaizeTester"
          echo "ldid2 exit: $?"
          
          # 验证签名
          echo "=== Verify ==="
          ldid2 -e "$APP_PATH/BaizeTester" 2>&1 | head -20
          
          # 打包IPA
          mkdir -p Payload
          rm -rf Payload/BaizeTester.app
          cp -R "$APP_PATH" Payload/
          zip -r BaizeTester.ipa Payload/
          
          echo "IPA: $(ls -lh BaizeTester.ipa | awk '{print $5}')"
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BaizeTester.ipa
          path: BaizeTester.ipa
          retention-days: 7
