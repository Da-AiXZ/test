name: Build BaizeTester IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install xcodegen
        run: brew install xcodegen
      
      - name: Install ldid
        run: brew install ldid-procursus
      
      - name: Generate Xcode project
        run: |
          xcodegen generate
          echo "=== Schemes ==="
          find BaizeTester.xcodeproj -name "*.xcscheme" 2>/dev/null || echo "No schemes"
      
      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun --show-sdk-version -sdk iphoneos
      
      - name: Build archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project BaizeTester.xcodeproj \
            -scheme BaizeTester \
            -archivePath ./build/BaizeTester.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO
      
      - name: Cross-compile baize_v2
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun clang -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=15.0 \
            -o baize_v2 \
            BaizeTester/baize_v2.c
          file baize_v2
          ls -la baize_v2
      
      - name: Package IPA
        run: |
          APP_PATH="./build/BaizeTester.xcarchive/Products/Applications/BaizeTester.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found"
            find ./build -name "*.app" | head -5
            exit 1
          fi
          
          echo "=== .app contents ==="
          ls -la "$APP_PATH/"
          
          # 把交叉编译的 baize_v2 放入 .app bundle
          echo "=== Embedding baize_v2 ==="
          cp baize_v2 "$APP_PATH/"
          ls -la "$APP_PATH/baize_v2"
          
          # 伪签名主二进制
          echo "=== Signing main binary ==="
          ldid2 -SBaizeTester/Entitlements.plist "$APP_PATH/BaizeTester"
          echo "ldid2 exit: $?"
          
          # 伪签名 baize_v2（TrollStore 可能需要）
          echo "=== Signing baize_v2 ==="
          ldid2 -S "$APP_PATH/baize_v2"
          echo "ldid2 baize_v2 exit: $?"
          
          # 验证签名
          echo "=== Verify ==="
          ldid2 -e "$APP_PATH/BaizeTester" 2>&1 | head -20
          
          # 打包IPA
          mkdir -p Payload
          rm -rf Payload/BaizeTester.app
          cp -R "$APP_PATH" Payload/
          zip -r BaizeTester.ipa Payload/
          
          echo "IPA: $(ls -lh BaizeTester.ipa | awk '{print $5}')"
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BaizeTester.ipa
          path: BaizeTester.ipa
          retention-days: 7
