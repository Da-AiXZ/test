name: Build BaizeTester IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install xcodegen
        run: brew install xcodegen
      
      - name: Install ldid
        run: brew install ldid-procursus
      
      - name: Generate Xcode project
        run: |
          xcodegen generate
          echo "=== Schemes ==="
          find BaizeTester.xcodeproj -name "*.xcscheme" 2>/dev/null || echo "No schemes"
      
      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcrun --show-sdk-version -sdk iphoneos
      
      - name: Build archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project BaizeTester.xcodeproj \
            -scheme BaizeTester \
            -archivePath ./build/BaizeTester.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO
      
      - name: Cross-compile baize_v2
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          # v5: executable (posix_spawn test)
          xcrun clang -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=15.0 \
            -o baize_v2 \
            BaizeTester/baize_v2.c
          echo "=== baize_v2 ==="
          file baize_v2
          ls -la baize_v2
          
          # v6: dylib (dlopen test - runs in App process!)
          xcrun clang -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=15.0 \
            -shared \
            -o libbaize_v2.dylib \
            BaizeTester/baize_v2_lib.c
          echo "=== libbaize_v2.dylib ==="
          file libbaize_v2.dylib
          ls -la libbaize_v2.dylib
      
      - name: Download Python 3.13 for iOS (beeWare)
        run: |
          echo "=== Downloading beeware Python-Apple-support ==="
          curl -L -o python-ios.tar.gz \
            "https://github.com/beeware/Python-Apple-support/releases/download/3.13-b14/Python-3.13-iOS-support.b14.tar.gz"
          
          echo "=== Extracting ==="
          mkdir -p python-ios
          tar xzf python-ios.tar.gz --strip-components=3 -C python-ios \
            Python.xcframework/ios-arm64/lib/libpython3.13.dylib \
            Python.xcframework/ios-arm64/lib-arm64/python3.13/
          
          # Rename stdlib dir so Python finds it at {home}/lib/python3.13/
          # PYTHONHOME = app bundle, Python looks for {PYTHONHOME}/lib/python3.13/
          mkdir -p python-ios/lib
          mv python-ios/python3.13 python-ios/lib/
          
          echo "=== Python artifacts ==="
          ls -lh python-ios/libpython3.13.dylib
          ls python-ios/lib/python3.13/ | head -10
          echo "  ... ($(find python-ios/lib/python3.13 -type f | wc -l) files total)"
          du -sh python-ios/
      
      - name: Package IPA
        run: |
          APP_PATH="./build/BaizeTester.xcarchive/Products/Applications/BaizeTester.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found"
            find ./build -name "*.app" | head -5
            exit 1
          fi
          
          echo "=== .app contents ==="
          ls -la "$APP_PATH/"
          
          # Embed baize_v2 executable + dylib
          echo "=== Embedding binaries ==="
          cp baize_v2 "$APP_PATH/"
          cp libbaize_v2.dylib "$APP_PATH/"
          
          # Embed Python dylib + stdlib
          echo "=== Embedding Python ==="
          cp python-ios/libpython3.13.dylib "$APP_PATH/"
          cp -R python-ios/lib "$APP_PATH/"
          ls -la "$APP_PATH/libpython3.13.dylib" "$APP_PATH/lib/"
          echo "Python stdlib: $(find $APP_PATH/lib/python3.13 -type f | wc -l) files"
          
          # Sign main binary
          echo "=== Signing main binary ==="
          ldid2 -SBaizeTester/Entitlements.plist "$APP_PATH/BaizeTester"
          echo "ldid2 exit: $?"
          
          # Sign baize_v2
          echo "=== Signing baize_v2 ==="
          ldid2 -S "$APP_PATH/baize_v2"
          
          # Sign all dylibs
          echo "=== Signing dylibs ==="
          ldid2 -S "$APP_PATH/libbaize_v2.dylib"
          ldid2 -S "$APP_PATH/libpython3.13.dylib"
          # Sign Python .so extensions (needed for import)
          for so in $(find "$APP_PATH/lib/python3.13" -name "*.so" -type f); do
            ldid2 -S "$so"
          done
          
          # Verify
          echo "=== Verify ==="
          ldid2 -e "$APP_PATH/BaizeTester" 2>&1 | head -20
          
          # Package IPA
          mkdir -p Payload
          rm -rf Payload/BaizeTester.app
          cp -R "$APP_PATH" Payload/
          zip -r BaizeTester.ipa Payload/
          
          echo "IPA size: $(ls -lh BaizeTester.ipa | awk '{print $5}')"
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BaizeTester.ipa
          path: BaizeTester.ipa
          retention-days: 7
